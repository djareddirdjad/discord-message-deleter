<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Discord Message Deleter</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      width: 300px;
      padding: 16px;
      background: #1e1f22;
      color: #dbdee1;
    }
    h2 { color: #5865f2; margin-bottom: 4px; }
    p { font-size: 12px; color: #949ba4; margin-bottom: 12px; }
    label { font-size: 13px; display: block; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 6px 8px;
      background: #2b2d31;
      border: 1px solid #3f4147;
      border-radius: 4px;
      color: #dbdee1;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #5865f2;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #4752c4; }
    button:disabled { background: #3f4147; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #949ba4;
      min-height: 16px;
    }
    #stop {
      margin-top: 6px;
      background: #ed4245;
      display: none;
    }
    #stop:hover { background: #c03537; }
  </style>
</head>
<body>
  <h2>Discord Message Deleter</h2>
  <p>Deletes only YOUR messages. Use a delay of 1000ms+ to stay safe.</p>

  <label>Author ID (your Discord user ID)</label>
  <input type="text" id="authorId" placeholder="e.g. 123456789012345678" />

  <label>Delay between deletions (ms)</label>
  <input type="number" id="delay" value="1200" min="500" />

  <button id="start">Start Deleting</button>
  <button id="stop">Stop</button>
  <div id="status">Idle.</div>

  <script src="popup.js"></script>
</body>
</html>
